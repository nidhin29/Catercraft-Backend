services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    command: npm run dev
    depends_on:
      - redis
    restart: always
    develop:
      watch:
        - path: package.json
          action: rebuild
        - path: package-lock.json
          action: rebuild
        - path: ./src
          action: sync
          target: /app/src
    volumes:
      - .:/app
      - /app/node_modules

  # A local Redis service for development
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

