services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://admin:Godgreat29@@rabbitmq:5672
    command: npm run dev
    depends_on:
      - redis
      - rabbitmq
    restart: always
    develop:
      watch:
        - path: package.json
          action: rebuild
        - path: package-lock.json
          action: rebuild
        - path: ./src
          action: sync
          target: /app/src
    volumes:
      - .:/app
      - /app/node_modules

  # A local Redis service for development
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # RabbitMQ with Management UI
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: Godgreat29@
